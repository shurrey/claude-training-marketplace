<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Key Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      padding: 24px;
      color: var(--color-text-primary, #1a1a2e);
      background: var(--color-background-primary, #ffffff);
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text-primary, #1a1a2e);
    }
    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary, #666);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--color-border-primary, #ddd);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-mono, monospace);
      background: var(--color-background-secondary, #f8f8f8);
      color: var(--color-text-primary, #1a1a2e);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #048A81; }
    input::placeholder { color: var(--color-text-tertiary, #999); }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #048A81;
      color: white;
    }
    .btn-primary:hover { background: #037a72; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-link {
      background: none;
      color: #048A81;
      padding: 10px 0;
      text-decoration: underline;
      font-size: 13px;
    }
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .status.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .status.loading {
      display: block;
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }
    .already-configured {
      padding: 16px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .already-configured p { color: #065f46; font-size: 14px; }
    .help-text {
      font-size: 13px;
      color: var(--color-text-secondary, #666);
      line-height: 1.5;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <h2>API Key Setup</h2>
    <p class="subtitle">To make live API calls during training, you'll need an Anthropic API key.</p>

    <div id="configured" class="already-configured" style="display:none">
      <p>Your API key is configured and working.</p>
    </div>

    <div id="setup-form">
      <div class="input-group">
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
        <button class="btn-primary" id="save-btn">Validate & Save</button>
      </div>
      <p class="help-text">
        Your key is stored locally and never sent anywhere except the Anthropic API.
      </p>
      <button class="btn-link" id="console-link">Don't have a key? Get one from console.anthropic.com</button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <!-- BUNDLE -->
</body>
</html>
